<!DOCTYPE html>

<body>
<div class="container">

    <section id="liberty">
        <h2>Die Freiheitsstatue</h2>

        <div class="image-container-r">
            <div class="img-right">
                <img src="../assets/liberty1.webp">
                <img src="../assets/liberty6.jpg">
            </div>
            <img src="../assets/liberty5.jpg" class="image">
        </div>
    </section>

    <section id="time">
        <div class="image-container-l">
            <div class="img-left">
                <img src="../assets/time1.jpg">
                <img src="../assets/time2.jpg">
            </div>
            <img src="../assets/time3.jpg" class="image">
        </div>
        <h2>Times Square</h2>
    </section>

    <section id="flatiron">
        <h2>Flatiron Building</h2>
        <div class="image-container-r">
            <div class="img-right">
                <img src="../assets/flatiron.jpg">
                <img src="../assets/flatiron3.jpg">
            </div>
            <img src="../assets/flatiron2.jpg" class="image">
        </div>
    </section>

    <section id="chrysler">
        <div class="image-container-l">
            <img src="../assets/chrysler2.jpg"class="image">
            <img src="../assets/chrysler3.jpg"class="image">
        </div>
        <h2>Chrysler Building</h2>
    </section>

    <section id="state">
        <h2>Empire State Building</h2>
        <div class="image-container-r">
            <img src="../assets/empire3.jpg" class="image">

                <img src="../assets/empire.jpg">
                <img src="../assets/empire2.jpg">
            </div>

        <div class="image-container-l">

                <img src="../assets/brooklyn2.jpg">

            <img src="../assets/brooklyn3.jpg" class="image">

        <h2>Brooklyn Bridge</h2>

    <section id="terminal">
        <h2>Grand Central Terminal</h2>
        <div class="img-left">
            <img src="../assets/terminal.jpg">
            <img src="../assets/terminal2.jpeg">

    <section id="library">

            <img src="../assets/library2.jpg">
            <img src="../assets/library3.jpg">
        </div>

        <h2>Central Park</h2>
        <div class="image-container-r">
            <div class="img-right">
                <img src="../assets/park.jpg">
                <img src="../assets/park2.jpg">

            <img src="../assets/park3.jpg" class="image">
        </div>

    <section id="line">
        <div class="image-container-l">
            <div class="img-left">
                <img src="../assets/line2.jpg">
                <img src="../assets/line3.jpg">

            <img src="../assets/line.jpg" class="image">

        <h2>High Line</h2>
